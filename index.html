<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#667eea">
    <meta name="description" content="Sistem E-Booking Kemudahan Sekolah - Book Dewan, Makmal, Surau & Lain-lain">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Favicon & Icons (logo hanya untuk icon, bukan dalam page) -->
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    
    <title>Sistem Booking Kemudahan Sekolah</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .sync-status {
            text-align: center;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 10px;
            font-size: 0.9em;
            font-weight: 600;
        }

        .sync-status.connected {
            background: #d4edda;
            color: #155724;
        }

        .sync-status.disconnected {
            background: #f8d7da;
            color: #721c24;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9ff;
            border-radius: 15px;
            border: 2px solid #e0e0e0;
            flex-wrap: wrap;
        }

        .week-nav {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .week-nav button {
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .week-nav button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .week-display {
            font-size: 1.2em;
            font-weight: bold;
            color: #667eea;
            min-width: 250px;
            text-align: center;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .filter-group label {
            font-weight: 600;
            color: #555;
        }

        .filter-group select {
            padding: 10px 15px;
            font-size: 1em;
            border: 2px solid #667eea;
            border-radius: 10px;
            background: white;
            color: #333;
            cursor: pointer;
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
        }

        .legend-box {
            width: 25px;
            height: 25px;
            border-radius: 5px;
            border: 2px solid #ddd;
        }

        .legend-box.available {
            background: white;
        }

        .legend-box.booked {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .facilities-container {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .facility-section {
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            padding: 20px;
            background: #fafafa;
        }

        .facility-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 2px solid #667eea;
        }

        .facility-icon {
            font-size: 2em;
        }

        .facility-name {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
        }

        .schedule-grid {
            display: grid;
            grid-template-columns: 120px repeat(19, 1fr);
            gap: 5px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
            padding-bottom: 10px;
        }

        .schedule-grid::-webkit-scrollbar {
            height: 8px;
        }

        .schedule-grid::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .schedule-grid::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        .day-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 8px;
            text-align: center;
            font-weight: bold;
            border-radius: 8px;
            font-size: 0.85em;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
        }

        .time-label {
            background: #f0f0f0;
            padding: 8px 4px;
            text-align: center;
            font-weight: 600;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            font-size: 0.7em;
        }

        .time-slot {
            background: white;
            border: 2px solid #e0e0e0;
            padding: 8px 4px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            min-height: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            font-size: 0.7em;
            user-select: none;
        }

        .time-slot:hover:not(.booked) {
            background: #f0f4ff;
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }

        .time-slot.booked {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
            cursor: pointer;
        }

        .time-slot.booked:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .booking-teacher {
            font-weight: bold;
            margin-bottom: 2px;
            font-size: 1em;
        }

        .booking-purpose {
            font-size: 0.85em;
            opacity: 0.9;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: white;
            max-width: 500px;
            margin: 80px auto;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-height: 85vh;
            overflow-y: auto;
        }

        .modal-header {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 20px;
            color: #667eea;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            resize: vertical;
            min-height: 60px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        button {
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            flex: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            flex: 1;
            background: #e0e0e0;
            color: #555;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .btn-delete {
            flex: 1;
            background: #ff4444;
            color: white;
        }

        .btn-delete:hover {
            background: #cc0000;
        }

        .floating-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 18px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
            transition: all 0.3s ease;
            z-index: 999;
        }

        .floating-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 35px rgba(102, 126, 234, 0.6);
        }

        .date-time-slots {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 15px;
        }

        .date-time-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            box-shadow: 0 3px 10px rgba(102, 126, 234, 0.3);
        }

        .date-time-info {
            flex: 1;
        }

        .date-time-info .date-display {
            font-size: 1em;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .date-time-info .time-display {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 6px;
        }

        .date-time-info .purpose-display {
            font-size: 0.85em;
            opacity: 0.85;
            font-style: italic;
            padding: 5px 10px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 6px;
            margin-top: 8px;
        }

        .remove-slot-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2em;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .remove-slot-btn:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: scale(1.1);
        }

        .add-date-btn {
            padding: 10px 15px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 600;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 10px;
        }

        .add-date-btn:hover {
            background: #218838;
            transform: translateY(-1px);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
            font-size: 1.2em;
        }

        @media (max-width: 768px) {
            body { padding: 10px; }
            .container { padding: 15px; }
            h1 { font-size: 1.3em; }
            .controls { flex-direction: column; padding: 15px; }
            .week-nav { flex-direction: column; width: 100%; }
            .week-nav button { width: 100%; }
            .schedule-grid {
                grid-template-columns: 80px repeat(19, minmax(70px, 1fr));
                gap: 3px;
            }
            .time-slot, .time-label { font-size: 0.65em; min-height: 55px; }
            .floating-btn { bottom: 20px; right: 20px; padding: 14px 24px; }
            .modal-content { margin: 20px auto; max-width: 95%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏫 Sistem Booking Kemudahan Sekolah</h1>
        <p class="subtitle">Klik pada slot untuk membuat atau melihat tempahan</p>

        <div class="sync-status" id="syncStatus">
            <span id="statusText">⏳ Menyambung ke database...</span>
        </div>

        <div class="controls">
            <div class="week-nav">
                <button id="prevWeekBtn">◀ Minggu Lepas</button>
                <div class="week-display" id="weekDisplay"></div>
                <button id="nextWeekBtn">Minggu Depan ▶</button>
            </div>
            <div class="filter-group">
                <label for="facilityFilter">Kemudahan:</label>
                <select id="facilityFilter">
                    <option value="all">Semua Kemudahan</option>
                    <option value="Dewan">🏛️ Dewan</option>
                    <option value="Makmal Komputer">💻 Makmal Komputer</option>
                    <option value="Makmal Sains">🔬 Makmal Sains</option>
                    <option value="Bilik Mesyuarat">👥 Bilik Mesyuarat</option>
                    <option value="Perpustakaan">📚 Perpustakaan</option>
                    <option value="Surau">🕌 Surau</option>
                    <option value="Bengkel RBT">🔧 Bengkel RBT</option>
                    <option value="Bilik Seni">🎨 Bilik Seni</option>

        </div>

        <div class="legend">
            <div class="legend-item">
                <div class="legend-box available"></div>
                <span>Tersedia</span>
            </div>
            <div class="legend-item">
                <div class="legend-box booked"></div>
                <span>Telah Ditempah</span>
            </div>
        </div>

        <div class="facilities-container" id="facilitiesContainer">
            <div class="loading">Memuatkan data...</div>
        </div>
    </div>

    <button class="floating-btn" id="newBookingBtn">➕ Booking Baru</button>

    <div class="modal" id="bookingModal">
        <div class="modal-content">
            <div class="modal-header" id="modalTitle">Buat Tempahan Baru</div>
            
            <div id="bookingFormSection">
                <div class="form-group">
                    <label>Nama Cikgu:</label>
                    <input type="text" id="teacherName">
                </div>
                <div class="form-group">
                    <label>Kemudahan:</label>
                    <select id="bookingFacility">
                        <option value="">Pilih Kemudahan</option>
                        <option value="Dewan">🏛️ Dewan</option>
                        <option value="Makmal Komputer">💻 Makmal Komputer</option>
                        <option value="Makmal Sains">🔬 Makmal Sains</option>
                        <option value="Bilik Mesyuarat">👥 Bilik Mesyuarat</option>
                        <option value="Perpustakaan">📚 Perpustakaan</option>
                        <option value="Surau">🕌 Surau</option>
                        <option value="Bengkel RBT">🔧 Bengkel RBT</option>
                        <option value="Bilik Seni">🎨 Bilik Seni</option>
                        <option value="Kantin">🍽️ Kantin</option>
                    </select>
                </div>
                
                <div style="margin-bottom: 20px;">
                    <label style="font-size: 1.1em; color: #667eea; margin-bottom: 15px; display: block;">📅 Tarikh, Masa & Tujuan:</label>
                    
                    <div style="background: white; padding: 15px; border-radius: 10px; border: 2px solid #e0e0e0; margin-bottom: 15px;">
                        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px;">
                            <div>
                                <label style="font-size: 0.9em; margin-bottom: 5px;">Tarikh:</label>
                                <input type="date" id="newDateInput" style="width: 100%;">
                            </div>
                            <div>
                                <label style="font-size: 0.9em; margin-bottom: 5px;">Dari:</label>
                                <select id="newStartTime" style="width: 100%;">
                                    <option value="">Pilih</option>
                                </select>
                            </div>
                            <div>
                                <label style="font-size: 0.9em; margin-bottom: 5px;">Sampai:</label>
                                <select id="newEndTime" style="width: 100%;">
                                    <option value="">Pilih</option>
                                </select>
                            </div>
                        </div>
                        <div style="margin-bottom: 10px;">
                            <label style="font-size: 0.9em; margin-bottom: 5px;">Tujuan:</label>

    <!-- Firebase SDK -->
    <script type="module">
        // ============================================
        // FIREBASE CONFIGURATION
        // ============================================
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getDatabase, ref, set, get, remove } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

        const firebaseConfig = {
		  apiKey: "AIzaSyBXGG5m02BOkzzdeiVEgwTr0xEutho78xU",
		  authDomain: "sistem-tempahan-3631b.firebaseapp.com",
		  databaseURL: "https://sistem-tempahan-3631b-default-rtdb.asia-southeast1.firebasedatabase.app",
		  projectId: "sistem-tempahan-3631b",
		  storageBucket: "sistem-tempahan-3631b.firebasestorage.app",
		  messagingSenderId: "9782286023",
		  appId: "1:9782286023:web:0ff857c7a66459e924d0e2"
		};

        // Initialize Firebase
        let app, database;
        let isFirebaseConnected = false;

        try {
            app = initializeApp(firebaseConfig);
            database = getDatabase(app);
            isFirebaseConnected = true;
            console.log('✅ Firebase connected successfully!');
            console.log('📍 Database URL:', firebaseConfig.databaseURL);
            updateSyncStatus(true);
        } catch (error) {
            console.error('❌ Firebase initialization error:', error);
            updateSyncStatus(false);
        }

        // ============================================
        // KEY GENERATION FUNCTION (CRITICAL FIX!)
        // ============================================
        
        function generateBookingKey(facility, date, timeSlot) {
            // Replace spaces in facility name with hyphens for consistent Firebase keys
            const cleanFacility = facility.replace(/\s+/g, '-');
            return `${cleanFacility}-${date}-${timeSlot}`;
        }

        // ============================================
        // DATA & CONFIGURATION
        // ============================================
        
        const facilities = [
            { name: 'Dewan', icon: '🏛️' },
            { name: 'Makmal Komputer', icon: '💻' },
            { name: 'Makmal Sains', icon: '🔬' },
            { name: 'Bilik Mesyuarat', icon: '👥' },
            { name: 'Perpustakaan', icon: '📚' },
            { name: 'Surau', icon: '🕌' },
            { name: 'Bengkel RBT', icon: '🔧' },
            { name: 'Bilik Seni', icon: '🎨' },
            { name: 'Kantin', icon: '🍽️' }
        ];

        const timeSlots = [
            '7:30-8:00', '8:00-8:30', '8:30-9:00', '9:00-9:30', '9:30-10:00',
            '10:00-10:30', '10:30-11:00', '11:00-11:30', '11:30-12:00', '12:00-12:30',
            '12:30-1:00', '1:00-1:30', '1:30-2:00', '2:00-2:30', '2:30-3:00',
            '3:00-3:30', '3:30-4:00', '4:00-4:30', '4:30-5:00'
        ];

        const daysOfWeek = ['Ahad', 'Isnin', 'Selasa', 'Rabu', 'Khamis', 'Jumaat', 'Sabtu'];

        let bookings = {};
        let currentBooking = null;
        let currentWeekStart = getMonday(new Date());
        let dateTimeSlots = [];
        let cachedWeeks = {}; // Cache untuk reduce reads

        // ============================================
        // OPTIMIZED FIREBASE FUNCTIONS
        // ============================================

        function updateSyncStatus(connected) {
            const statusDiv = document.getElementById('syncStatus');
            const statusText = document.getElementById('statusText');
            
            if (connected) {
                statusDiv.className = 'sync-status connected';
                statusText.textContent = '✅ Tersambung - Data sync optimized';
            } else {
                statusDiv.className = 'sync-status disconnected';
                statusText.textContent = '❌ Offline - Guna localStorage';
            }
        }

        // OPTIMIZATION 1: Fetch all bookings and filter by week locally
        async function loadBookingsForWeek(weekStart) {
            const weekKey = getWeekKey(weekStart);
            
            // Check cache first
            if (cachedWeeks[weekKey]) {
                bookings = cachedWeeks[weekKey];
                renderFacilities();
                return;
            }

            if (isFirebaseConnected) {
                try {
                    const weekDates = getWeekDates(weekStart);
                    const startDate = getDateString(weekDates[0]);
                    const endDate = getDateString(weekDates[6]);
                    
                    // Fetch ALL bookings from Firebase
                    const bookingsRef = ref(database, 'bookings');
                    const snapshot = await get(bookingsRef);
                    const allBookings = snapshot.val() || {};
                    
                    // Filter for current week only
                    bookings = {};
                    Object.keys(allBookings).forEach(key => {
                        // Extract date from key - handles both formats:
                        // Format 1: "Makmal-Komputer-2026-03-13-7:30-8:00" (hyphen)
                        // Format 2: "Makmal Komputer-2026-03-05-12:30-1:00" (space)
                        
                        // Use regex to find YYYY-MM-DD pattern
                        const dateMatch = key.match(/(\d{4})-(\d{2})-(\d{2})/);
                        
                        if (dateMatch) {
                            const dateInKey = `${dateMatch[1]}-${dateMatch[2]}-${dateMatch[3]}`;
                            
                            // Check if date is within current week
                            if (dateInKey >= startDate && dateInKey <= endDate) {
                                bookings[key] = allBookings[key];
                            }
                        }
                    });
                    
                    // Cache this week's data
                    cachedWeeks[weekKey] = bookings;
                    
                    console.log(`📅 Loaded ${Object.keys(bookings).length} bookings for week ${startDate} to ${endDate}`);
                    console.log('🔍 Sample keys:', Object.keys(bookings).slice(0, 3));
                    
                    renderFacilities();
                } catch (error) {
                    console.error('❌ Error loading bookings:', error);
                    // Fallback to localStorage
                    const saved = localStorage.getItem('schoolBookings');
                    if (saved) {
                        bookings = JSON.parse(saved);
                    }
                    renderFacilities();
                }
            } else {
                // Fallback to localStorage
                const saved = localStorage.getItem('schoolBookings');
                if (saved) {
                    bookings = JSON.parse(saved);
                }
                renderFacilities();
            }
        }

        // OPTIMIZATION 2: Save individual booking instead of entire object
        async function saveBooking(key, bookingData) {
            if (isFirebaseConnected) {
                try {
                    await set(ref(database, `bookings/${key}`), bookingData);
                    
                    // Update cache
                    bookings[key] = bookingData;
                    const weekKey = getWeekKey(currentWeekStart);
                    if (cachedWeeks[weekKey]) {
                        cachedWeeks[weekKey][key] = bookingData;
                    }
                } catch (error) {
                    console.error('Error saving to Firebase:', error);
                    throw error;
                }
            } else {
                // Fallback to localStorage
                bookings[key] = bookingData;
                localStorage.setItem('schoolBookings', JSON.stringify(bookings));
            }
        }

        // OPTIMIZATION 3: Delete individual booking
        async function deleteBooking(key) {
            if (isFirebaseConnected) {
                try {
                    await remove(ref(database, `bookings/${key}`));
                    
                    // Update cache
                    delete bookings[key];
                    const weekKey = getWeekKey(currentWeekStart);
                    if (cachedWeeks[weekKey]) {
                        delete cachedWeeks[weekKey][key];
                    }
                } catch (error) {
                    console.error('Error deleting from Firebase:', error);
                    throw error;
                }
            } else {
                // Fallback to localStorage
                delete bookings[key];
                localStorage.setItem('schoolBookings', JSON.stringify(bookings));
            }
        }

        // Helper: Get week cache key
        function getWeekKey(date) {
            return `${date.getFullYear()}-W${getWeekNumber(date)}`;
        }

        // Helper: Get week number
        function getWeekNumber(date) {
            const d = new Date(date);
            d.setHours(0, 0, 0, 0);
            d.setDate(d.getDate() + 4 - (d.getDay() || 7));
            const yearStart = new Date(d.getFullYear(), 0, 1);
            return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
        }

        // ============================================
        // UI FUNCTIONS
        // ============================================

        function getMonday(date) {
            const d = new Date(date);
            const day = d.getDay();
            const diff = d.getDate() - day + (day === 0 ? -6 : 1);
            return new Date(d.setDate(diff));
        }

        function formatDate(date) {
            const d = new Date(date);
            const day = String(d.getDate()).padStart(2, '0');
            const month = String(d.getMonth() + 1).padStart(2, '0');
            return `${day}/${month}`;
        }

        function getDateString(date) {
            const d = new Date(date);
            return d.toISOString().split('T')[0];
        }

        function getWeekDates(weekStart = currentWeekStart) {
            const dates = [];
            for (let i = 0; i < 7; i++) {
                const date = new Date(weekStart);
                date.setDate(weekStart.getDate() + i);
                dates.push(date);
            }
            return dates;
        }

        function updateWeekDisplay() {
            const weekDates = getWeekDates();
            const start = formatDate(weekDates[0]);
            const end = formatDate(weekDates[6]);
            const year = weekDates[0].getFullYear();
            document.getElementById('weekDisplay').textContent = `${start} - ${end} (${year})`;
        }

        function previousWeek() {
            currentWeekStart.setDate(currentWeekStart.getDate() - 7);
            updateWeekDisplay();
            loadBookingsForWeek(currentWeekStart);
        }

        function nextWeek() {
            currentWeekStart.setDate(currentWeekStart.getDate() + 7);
            updateWeekDisplay();
            loadBookingsForWeek(currentWeekStart);
        }

        function renderFacilities() {
            const container = document.getElementById('facilitiesContainer');
            container.innerHTML = '';
            
            const filterValue = document.getElementById('facilityFilter').value;
            const facilitiesToShow = filterValue === 'all' ? facilities : facilities.filter(f => f.name === filterValue);
            const weekDates = getWeekDates();

            facilitiesToShow.forEach(facility => {
                const section = document.createElement('div');
                section.className = 'facility-section';

                const header = document.createElement('div');
                header.className = 'facility-header';
                header.innerHTML = `<span class="facility-icon">${facility.icon}</span><span class="facility-name">${facility.name}</span>`;
                section.appendChild(header);

                const grid = document.createElement('div');
                grid.className = 'schedule-grid';

                const cornerCell = document.createElement('div');
                cornerCell.className = 'time-label';
                cornerCell.style.background = 'transparent';
                cornerCell.style.border = 'none';
                grid.appendChild(cornerCell);
                
                timeSlots.forEach(time => {
                    const timeHeader = document.createElement('div');
                    timeHeader.className = 'time-label';
                    timeHeader.textContent = time;
                    grid.appendChild(timeHeader);
                });

                weekDates.forEach(date => {
                    const dayName = daysOfWeek[date.getDay()];
                    const dateStr = getDateString(date);
                    const dateDisplay = formatDate(date);
                    
                    const dayLabel = document.createElement('div');
                    dayLabel.className = 'day-header';
                    dayLabel.innerHTML = `<div>${dayName}</div><div style="font-size:0.85em">${dateDisplay}</div>`;
                    grid.appendChild(dayLabel);
                    
                    timeSlots.forEach(time => {
                        const key = generateBookingKey(facility.name, dateStr, time);
                        const booking = bookings[key];
                        
                        const slot = document.createElement('div');
                        slot.className = 'time-slot';
                        
                        slot.addEventListener('click', () => {
                            openModal(facility.name, dateStr, time, booking);
                        });

                        if (booking) {
                            slot.classList.add('booked');
                            slot.innerHTML = `<div class="booking-teacher">${booking.teacher}</div><div class="booking-purpose">${booking.purpose}</div>`;
                        } else {
                            slot.innerHTML = '<span style="color: #999;">-</span>';
                        }

                        grid.appendChild(slot);
                    });
                });

                section.appendChild(grid);
                container.appendChild(section);
            });
        }

        function openModal(facility, date, time, booking) {
            currentBooking = { facility, date, time };
            
            const modal = document.getElementById('bookingModal');
            const modalTitle = document.getElementById('modalTitle');
            const formSection = document.getElementById('bookingFormSection');
            const deleteSection = document.getElementById('deleteSection');

            if (booking) {
                const d = new Date(date);
                const dayName = daysOfWeek[d.getDay()];
                const dateDisplay = d.toLocaleDateString('ms-MY', { day: 'numeric', month: 'long', year: 'numeric' });
                
                modalTitle.textContent = `Tempahan - ${facility}`;
                formSection.style.display = 'none';
                deleteSection.style.display = 'block';
                document.getElementById('existingDate').textContent = `${dayName}, ${dateDisplay}`;
                document.getElementById('existingTime').textContent = time;
                document.getElementById('existingTeacher').textContent = booking.teacher;
                document.getElementById('existingPurpose').textContent = booking.purpose;
            } else {
                modalTitle.textContent = `Booking Baru - ${facility}`;
                formSection.style.display = 'block';
                deleteSection.style.display = 'none';
                
                document.getElementById('teacherName').value = '';
                document.getElementById('bookingFacility').value = facility;
                document.getElementById('bookingFacility').disabled = true;
                document.getElementById('newDateInput').value = '';
                document.getElementById('newStartTime').value = '';
                document.getElementById('newEndTime').value = '';
                document.getElementById('newPurpose').value = '';
                
                dateTimeSlots = [];
                updateDateTimeSlotDisplay();
                populateNewSlotTimeDropdowns();
            }

            modal.style.display = 'block';
        }

        function openNewBookingModal() {
            currentBooking = null;
            
            const modal = document.getElementById('bookingModal');
            const modalTitle = document.getElementById('modalTitle');
            const formSection = document.getElementById('bookingFormSection');
            const deleteSection = document.getElementById('deleteSection');
            
            modalTitle.textContent = 'Buat Booking Baru';
            formSection.style.display = 'block';
            deleteSection.style.display = 'none';
            
            document.getElementById('teacherName').value = '';
            document.getElementById('bookingFacility').value = '';
            document.getElementById('bookingFacility').disabled = false;
            document.getElementById('newDateInput').value = '';
            document.getElementById('newStartTime').value = '';
            document.getElementById('newEndTime').value = '';
            document.getElementById('newPurpose').value = '';
            
            dateTimeSlots = [];
            updateDateTimeSlotDisplay();
            populateNewSlotTimeDropdowns();
            
            modal.style.display = 'block';
        }

        function closeModal() {
            document.getElementById('bookingModal').style.display = 'none';
            currentBooking = null;
            dateTimeSlots = [];
        }

        function populateNewSlotTimeDropdowns() {
            const startTimeSelect = document.getElementById('newStartTime');
            const endTimeSelect = document.getElementById('newEndTime');
            
            startTimeSelect.innerHTML = '<option value="">Pilih</option>';
            endTimeSelect.innerHTML = '<option value="">Pilih</option>';
            
            const timePoints = timeSlots.map(slot => slot.split('-')[0]);
            timePoints.push(timeSlots[timeSlots.length - 1].split('-')[1]);
            
            timePoints.slice(0, -1).forEach((time, index) => {
                const option = document.createElement('option');
                option.value = index;
                option.textContent = time;
                startTimeSelect.appendChild(option);
            });
            
            timePoints.slice(1).forEach((time, index) => {
                const option = document.createElement('option');
                option.value = index + 1;
                option.textContent = time;
                endTimeSelect.appendChild(option);
            });
        }

        function addDateTimeSlot() {
            const date = document.getElementById('newDateInput').value;
            const startIndex = parseInt(document.getElementById('newStartTime').value);
            const endIndex = parseInt(document.getElementById('newEndTime').value);
            const purpose = document.getElementById('newPurpose').value.trim();
            
            if (!date) {
                alert('Sila pilih tarikh!');
                return;
            }
            
            if (isNaN(startIndex) || isNaN(endIndex)) {
                alert('Sila pilih masa mula dan tamat!');
                return;
            }
            
            if (endIndex <= startIndex) {
                alert('Masa tamat mesti selepas masa mula!');
                return;
            }
            
            if (!purpose) {
                alert('Sila masukkan tujuan!');
                return;
            }
            
            dateTimeSlots.push({ date, startIndex, endIndex, purpose });
            updateDateTimeSlotDisplay();
            
            document.getElementById('newDateInput').value = '';
            document.getElementById('newStartTime').value = '';
            document.getElementById('newEndTime').value = '';
            document.getElementById('newPurpose').value = '';
        }

        function removeDateTimeSlot(index) {
            dateTimeSlots.splice(index, 1);
            updateDateTimeSlotDisplay();
        }

        function updateDateTimeSlotDisplay() {
            const container = document.getElementById('dateTimeSlots');
            
            const validSlots = dateTimeSlots.filter(slot => slot.purpose && slot.purpose.trim());
            
            if (validSlots.length === 0) {
                container.innerHTML = '<p style="color: #999; text-align: center; padding: 20px;">Tiada slot ditambah.</p>';
                return;
            }
            
            container.innerHTML = '';
            validSlots.forEach((slot, index) => {
                const d = new Date(slot.date);
                const dayName = daysOfWeek[d.getDay()];
                const dateDisplay = d.toLocaleDateString('ms-MY', { day: 'numeric', month: 'short', year: 'numeric' });
                
                const timePoints = timeSlots.map(s => s.split('-')[0]);
                timePoints.push(timeSlots[timeSlots.length - 1].split('-')[1]);
                
                const startTime = timePoints[slot.startIndex];
                const endTime = timePoints[slot.endIndex];
                
                const card = document.createElement('div');
                card.className = 'date-time-card';
                card.innerHTML = `
                    <div class="date-time-info">
                        <div class="date-display">📅 ${dayName}, ${dateDisplay}</div>
                        <div class="time-display">🕐 ${startTime} - ${endTime}</div>
                        <div class="purpose-display">📝 ${slot.purpose}</div>
                    </div>
                `;
                
                const removeBtn = document.createElement('button');
                removeBtn.className = 'remove-slot-btn';
                removeBtn.textContent = '✕';
                removeBtn.title = 'Buang';
                const actualIndex = dateTimeSlots.findIndex(s => s === slot);
                removeBtn.addEventListener('click', () => removeDateTimeSlot(actualIndex));
                
                card.appendChild(removeBtn);
                container.appendChild(card);
            });
        }

        async function handleBooking() {
            const teacher = document.getElementById('teacherName').value.trim();
            const facility = document.getElementById('bookingFacility').value;
            
            if (!teacher) {
                alert('Sila masukkan nama cikgu!');
                return;
            }
            
            if (!facility) {
                alert('Sila pilih kemudahan!');
                return;
            }
            
            if (dateTimeSlots.length === 0) {
                alert('Sila tambah sekurang-kurangnya satu tarikh, masa & tujuan!');
                return;
            }
            
            let totalConflicts = 0;
            let totalAvailable = 0;
            
            // OPTIMIZATION 4: Check conflicts only for relevant slots
            for (const slot of dateTimeSlots) {
                for (let i = slot.startIndex; i < slot.endIndex; i++) {
                    const key = generateBookingKey(facility, slot.date, timeSlots[i]);
                    
                    // If not in current bookings cache, fetch from Firebase
                    if (!bookings.hasOwnProperty(key) && isFirebaseConnected) {
                        try {
                            const snapshot = await get(ref(database, `bookings/${key}`));
                            if (snapshot.exists()) {
                                bookings[key] = snapshot.val();
                                totalConflicts++;
                            } else {
                                totalAvailable++;
                            }
                        } catch (error) {
                            console.error('Error checking conflict:', error);
                            totalAvailable++;
                        }
                    } else if (bookings[key]) {
                        totalConflicts++;
                    } else {
                        totalAvailable++;
                    }
                }
            }
            
            if (totalConflicts > 0) {
                if (!confirm(`⚠️ Ada ${totalConflicts} slot sudah ditempah.\n✅ ${totalAvailable} slot masih kosong.\n\nTeruskan booking untuk slot yang kosong?`)) {
                    return;
                }
            }
            
            let bookedCount = 0;
            try {
                for (const slot of dateTimeSlots) {
                    for (let i = slot.startIndex; i < slot.endIndex; i++) {
                        const key = generateBookingKey(facility, slot.date, timeSlots[i]);
                        if (!bookings[key]) {
                            await saveBooking(key, { teacher, purpose: slot.purpose });
                            bookedCount++;
                        }
                    }
                }
                
                alert(`✅ Berjaya! ${bookedCount} slot telah ditempah!`);
                closeModal();
                
                // Clear cache for affected weeks to force refresh
                cachedWeeks = {};
                loadBookingsForWeek(currentWeekStart);
            } catch (error) {
                console.error('❌ Booking error:', error);
                alert(`❌ Ada masalah semasa booking:\n\n${error.message}\n\nSila check console (F12) untuk details.`);
            }
        }

        async function handleDelete() {
            if (!currentBooking) {
                alert('❌ Error: Tiada booking dipilih.');
                closeModal();
                return;
            }
            
            const key = generateBookingKey(currentBooking.facility, currentBooking.date, currentBooking.time);
            const bookingToDelete = bookings[key];
            
            if (!bookingToDelete) {
                alert('❌ Booking tidak dijumpai.');
                closeModal();
                return;
            }
            
            const relatedSlots = [];
            Object.keys(bookings).forEach(k => {
                const booking = bookings[k];
                const parts = k.split('-');
                
                const timePart = parts.slice(-2).join('-');
                const datePart = parts.slice(-5, -2).join('-');
                const facilityPart = parts.slice(0, -5).join('-');
                
                if (booking.teacher === bookingToDelete.teacher &&
                    facilityPart === currentBooking.facility &&
                    datePart === currentBooking.date &&
                    booking.purpose === bookingToDelete.purpose) {
                    relatedSlots.push(k);
                }
            });
            
            if (relatedSlots.length === 0) {
                alert('❌ Tiada related slots dijumpai.');
                closeModal();
                return;
            }
            
            const slotCount = relatedSlots.length;
            let confirmMsg = `⚠️ Padam booking ini?\n\n`;
            confirmMsg += `📍 Tempat: ${currentBooking.facility}\n`;
            confirmMsg += `📅 Tarikh: ${currentBooking.date}\n`;
            confirmMsg += `👤 Cikgu: ${bookingToDelete.teacher}\n`;
            confirmMsg += `📝 Tujuan: ${bookingToDelete.purpose}\n`;
            confirmMsg += `🕐 Bilangan slot: ${slotCount} slot\n\n`;
            confirmMsg += `✅ SEMUA ${slotCount} slot akan dipadam sekaligus.`;
            
            if (!confirm(confirmMsg)) {
                return;
            }
            
            try {
                for (const slotKey of relatedSlots) {
                    await deleteBooking(slotKey);
                }
                
                alert(`✅ Berjaya! ${slotCount} slot telah dipadam!`);
                closeModal();
                
                // Clear cache to force refresh
                cachedWeeks = {};
                loadBookingsForWeek(currentWeekStart);
            } catch (error) {
                console.error('Delete process failed:', error);
                alert('❌ Ada masalah semasa delete. Cuba lagi.');
            }
        }

        // Event listeners
        document.getElementById('prevWeekBtn').addEventListener('click', previousWeek);
        document.getElementById('nextWeekBtn').addEventListener('click', nextWeek);
        document.getElementById('facilityFilter').addEventListener('change', renderFacilities);
        document.getElementById('newBookingBtn').addEventListener('click', openNewBookingModal);
        document.getElementById('addSlotBtn').addEventListener('click', addDateTimeSlot);
        document.getElementById('submitBookingBtn').addEventListener('click', handleBooking);
        document.getElementById('cancelBookingBtn').addEventListener('click', closeModal);
        document.getElementById('deleteBookingBtn').addEventListener('click', handleDelete);
        document.getElementById('closeDeleteBtn').addEventListener('click', closeModal);
        
        document.getElementById('newStartTime').addEventListener('change', function() {
            const startIndex = parseInt(this.value);
            const endTimeSelect = document.getElementById('newEndTime');
            
            if (!isNaN(startIndex)) {
                Array.from(endTimeSelect.options).forEach(option => {
                    if (option.value === '') return;
                    const endIndex = parseInt(option.value);
                    option.disabled = endIndex <= startIndex;
                });
                
                const currentEnd = parseInt(endTimeSelect.value);
                if (isNaN(currentEnd) || currentEnd <= startIndex) {
                    endTimeSelect.value = startIndex + 1;
                }
            }
        });

        document.getElementById('bookingModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // Initialize
        updateWeekDisplay();
        loadBookingsForWeek(currentWeekStart);
        populateNewSlotTimeDropdowns();
    </script>
</body>
</html>
